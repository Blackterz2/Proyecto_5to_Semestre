<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Recuperar contraseña — Blackterz</title>
  <link rel="stylesheet" href="/styles.css" />
  <style>
    .reset-container {
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 80vh;
      padding: 20px;
    }
    .reset-card {
      background: var(--bg-card);
      border-radius: 16px;
      padding: 40px 32px;
      max-width: 420px;
      width: 100%;
      text-align: center;
      box-shadow: 0 8px 32px rgba(0,0,0,0.3);
    }
    .reset-card h2 {
      color: var(--text-primary);
      margin: 0 0 8px;
      font-size: 22px;
    }
    .reset-card p {
      color: #aaa;
      margin: 0 0 28px;
      font-size: 14px;
      line-height: 1.5;
    }
    .reset-card .form-group {
      text-align: left;
      margin-bottom: 20px;
    }
    .reset-card .btn-login {
      width: 100%;
      margin-top: 4px;
    }
    .reset-card .btn-login:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }
    .reset-card .auth-toggle-link {
      margin-top: 20px;
    }
    .reset-card .auth-toggle-btn {
      color: var(--accent);
      cursor: pointer;
      text-decoration: none;
      font-weight: 600;
    }
    .reset-card .auth-toggle-btn:hover {
      text-decoration: underline;
    }
    .reset-card .login-error {
      margin-bottom: 16px;
      text-align: center;
    }
    .reset-success {
      display: none;
    }
    .reset-success h3 {
      color: #2e7d32;
      margin: 0 0 12px;
    }
    .reset-success p {
      color: #aaa;
      margin: 0 0 20px;
    }
  </style>
</head>
<body>
  <header class="header">
    <div class="container">
      <div class="header-row">
        <div>
          <h1 class="app-title">🏋️ Blackterz</h1>
          <p class="app-subtitle">Recuperación de contraseña</p>
        </div>
      </div>
    </div>
  </header>

  <main class="container">
    <div class="reset-container">
      <div class="reset-card">

        <!-- Formulario -->
        <div id="form-wrapper">
          <h2>¿Olvidaste tu contraseña?</h2>
          <p>Ingresá tu email y te enviaremos un enlace para restablecerla.</p>

          <div id="forgot-error" class="login-error hidden"></div>

          <div class="form-group">
            <label for="forgot-email" class="form-label">Email</label>
            <input
              type="email"
              id="forgot-email"
              class="form-input"
              placeholder="tu@email.com"
              autocomplete="email"
            />
          </div>

          <button id="btn-enviar-link" class="btn-login">Enviar enlace</button>

          <p class="auth-toggle-link">
            <a href="/" class="auth-toggle-btn">← Volver al login</a>
          </p>
        </div>

        <!-- Mensaje de éxito -->
        <div id="success-wrapper" class="reset-success">
          <h3>✅ Revisá tu email</h3>
          <p>Si el email está registrado, vas a recibir un enlace para restablecer tu contraseña.</p>
          <a href="/" class="btn-login" style="display:inline-block;text-decoration:none;">Volver al login</a>
        </div>

      </div>
    </div>
  </main>

  <script>
    const formWrapper    = document.getElementById('form-wrapper');
    const successWrapper = document.getElementById('success-wrapper');
    const btnEnviar      = document.getElementById('btn-enviar-link');
    const inputEmail     = document.getElementById('forgot-email');
    const errorEl        = document.getElementById('forgot-error');

    btnEnviar.addEventListener('click', async () => {
      const email = inputEmail.value.trim();

      if (!email) {
        errorEl.textContent = '❌ Ingresá tu email';
        errorEl.classList.remove('hidden');
        return;
      }

      btnEnviar.disabled = true;
      btnEnviar.textContent = 'Enviando...';
      errorEl.classList.add('hidden');

      try {
        const resp = await fetch('/api/auth/forgot-password', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email }),
        });

        const data = await resp.json();

        if (!data.ok) {
          errorEl.textContent = '❌ ' + (data.mensaje || 'Error al enviar');
          errorEl.classList.remove('hidden');
          btnEnviar.disabled = false;
          btnEnviar.textContent = 'Enviar enlace';
          return;
        }

        // Mostrar pantalla de éxito
        formWrapper.style.display = 'none';
        successWrapper.style.display = 'block';

      } catch (error) {
        errorEl.textContent = '❌ Error de conexión';
        errorEl.classList.remove('hidden');
        btnEnviar.disabled = false;
        btnEnviar.textContent = 'Enviar enlace';
      }
    });

    // Enter en el input
    inputEmail.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') btnEnviar.click();
    });
  </script>
</body>
</html>
